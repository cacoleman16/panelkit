name: Release

# Publishes wheels + sdist to PyPI on a version tag, using PyPI Trusted
# Publishing (OIDC) — no API tokens stored in the repo.
#
# One-time setup on PyPI: create the "panelkit" project's trusted publisher
# pointing at this repo + the "pypi" environment, then push a tag like v0.1.0.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  # Run JS-based actions on Node 24 (silences the Node-20 deprecation warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-wheels:
    name: Wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Guard against runner-queue stalls (a retired image can queue for 24 h).
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest   # Linux x86-64 (manylinux)
            target: x86_64
          - os: ubuntu-latest   # Linux ARM64 (manylinux, cross-compiled)
            target: aarch64
          - os: macos-latest    # macOS Intel, cross-compiled from the ARM
            target: x86_64      # runner (GitHub retired the macos-13 image)
          - os: macos-latest    # macOS Apple Silicon
            target: aarch64
          - os: windows-latest  # Windows x64
            target: x64
    steps:
      - uses: actions/checkout@v4
      - name: Build abi3 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --manifest-path crates/pypanelkit/Cargo.toml --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/pypanelkit/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach wheels + sdist to the GitHub Release
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create/update the GitHub Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or update the release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create the release with auto-generated notes if it doesn't exist yet,
          # otherwise just (re)upload the built artifacts onto the existing one.
          gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --generate-notes \
          || gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
