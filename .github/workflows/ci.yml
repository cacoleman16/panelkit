name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Run JS-based actions on Node 24 (silences the Node-20 deprecation warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    name: Rust (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (serial)
        run: cargo test --workspace
      - name: Test (parallel feature)
        run: cargo test -p panelkit-inference --features parallel
      - name: Determinism (1 vs 8 threads)
        run: |
          RAYON_NUM_THREADS=1 cargo test -p panelkit-inference --features parallel --test inference
          RAYON_NUM_THREADS=8 cargo test -p panelkit-inference --features parallel --test inference

  python:
    name: Python (build + pytest)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build + install panelkit (with test extras)
        # `pip install` drives the maturin PEP-517 backend — no virtualenv needed
        # (unlike `maturin develop`, which requires an activated venv).
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: pytest
        run: pytest python/tests -q

  wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/pypanelkit/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  # Single aggregating gate: branch protection requires this one stable context
  # instead of every matrix combination of the jobs above.
  ci-success:
    name: CI Success
    if: always()
    needs: [rust, python, wheels]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::A required CI job failed or was cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
